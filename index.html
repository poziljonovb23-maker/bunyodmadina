<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madinam uchun... ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0d1117;
            --glass: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Orqa fon effektlari */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* Konteynerlar */
        .step {
            display: none; /* Dastlab hamma yashirin */
            padding: 30px;
            max-width: 500px;
            animation: fadeIn 1.5s ease forwards;
        }

        .active {
            display: block; /* Faqat aktiv qadam ko'rinadi */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Tugma uslubi */
        .btn-next {
            padding: 12px 35px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.4s;
        }

        .btn-next:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        /* Taymer uslubi */
        .timer-container {
            margin-top: 20px;
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .timer-box span {
            display: block;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--gold);
        }

        .timer-box small {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Yurakchalar */
        .heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.6);
            pointer-events: none;
            animation: floatUp 4s linear infinite;
        }

        @keyframes floatUp {
            to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="step active" id="step1">
        <h1>Salom Go'zalim Madina! 👋</h1>
        <p>Senga kichik bir syurpriz tayyorladim...</p>
        <button class="btn-next" onclick="nextStep(2)">Davom eting</button>
    </div>

    <div class="step" id="step2">
        <h1>Madinam ✨</h1>
        <p>Siz dunyodagi eng chiroyli va yagona qizsiz!</p>
        
        <div style="font-style: italic; margin-bottom: 20px; opacity: 0.9;">
            "Sen mening hayotimdagi eng go'zal mo''jizasan. Sening borliging dunyoni nurga to'ldiradi."
        </div>

        <div class="timer-container">
            <div style="font-size: 0.8rem; letter-spacing: 1px;">BIZ BIRGAMIZ:</div>
            <div class="timer-grid" id="timer">
                </div>
        </div>
        
        <p style="margin-top: 30px; font-size: 0.9rem; color: var(--gold);">Har doim yonimda bo'l ❤️</p>
    </div>

    <script>
        // 1. Qadamlarni almashtirish funksiyasi
        function nextStep(stepNumber) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');
            
            if(stepNumber === 2) {
                startHearts();
                setInterval(updateTimer, 1000);
            }
        }

        // 2. Taymer: 2024-yil 12-oktabr
        const startDate = new Date(2024, 9, 12); // Yanvar=0, Oktabr=9

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            const timerDiv = document.getElementById("timer");
            if(timerDiv) {
                timerDiv.innerHTML = `
                    <div class="timer-box"><span>${days}</span><small>KUN</small></div>
                    <div class="timer-box"><span>${hours}</span><small>SOAT</small></div>
                    <div class="timer-box"><span>${mins}</span><small>DAQIQA</small></div>
                    <div class="timer-box"><span>${secs}</span><small>SONIYA</small></div>
                `;
            }
        }

        // 3. Yurakchalar effekti
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.bottom = '-5vh';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 400);
        }
    </script>
</body>
</html>
