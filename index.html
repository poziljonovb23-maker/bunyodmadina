<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madina uchun maxsus... ✨</title>
    <style>
        /* CSS QISMI */
        :root {
            --gold: #d4af37;
            --dark-blue: #0a0b10;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Yulduzli osmon effekti */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Markaziy karta */
        .card {
            position: relative;
            z-index: 10;
            width: 350px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.5s;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
        }

        .flower-icon {
            font-size: 50px;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 10px var(--gold));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .secret-text {
            height: 0;
            overflow: hidden;
            transition: 1s ease;
            opacity: 0;
            font-style: italic;
            line-height: 1.8;
            color: #e0e0e0;
        }

        .card.active .secret-text {
            height: auto;
            opacity: 1;
            margin-top: 20px;
        }

        .card.active .flower-icon {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Pastki tugma */
        .btn-magic {
            margin-top: 20px;
            padding: 10px 25px;
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-magic:hover {
            background: var(--gold);
            color: black;
        }

        /* Sparkles (Yulduzchalar) */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="stars" id="starField"></div>

    <div class="card" id="mainCard" onclick="revealMagic()">
        <span class="flower-icon">🌹</span>
        <h1>Madina</h1>
        <p style="font-size: 14px; opacity: 0.7;">Ustiga bosing...</p>
        
        <div class="secret-text" id="message">
            "Sen yulduzlar orasidagi eng yorqinisan. Sening borliging dunyoni go'zallashtiradi. Bu mitti sahifa sening sharafingga yaratildi..."
            <br><br>
            <strong>Har doim tabassum qil! ✨</strong>
        </div>
        
        <button class="btn-magic">Sehrni ko'rish</button>
    </div>

    <script>
        // JAVASCRIPT QISMI

        // 1. Dinamik yulduzlar yaratish
        function createStars() {
            const field = document.getElementById('starField');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'sparkle';
                const size = Math.random() * 3;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.opacity = Math.random();
                star.style.boxShadow = `0 0 ${Math.random() * 10}px white`;
                field.appendChild(star);
            }
        }

        // 2. Sehrli effekt (bosilganda)
        function revealMagic() {
            const card = document.getElementById('mainCard');
            card.classList.toggle('active');
            
            // Bosilganda atrofga yulduzcha sochish
            for(let i=0; i<20; i++) {
                createFirework();
            }
        }

        function createFirework() {
            const f = document.createElement('div');
            f.innerHTML = '✨';
            f.style.position = 'fixed';
            f.style.left = '50%';
            f.style.top = '50%';
            f.style.pointerEvents = 'none';
            f.style.transition = '2s';
            document.body.appendChild(f);

            const x = (Math.random() - 0.5) * 400;
            const y = (Math.random() - 0.5) * 400;

            setTimeout(() => {
                f.style.transform = `translate(${x}px, ${y}px) scale(0)`;
                f.style.opacity = '0';
            }, 10);

            setTimeout(() => f.remove(), 2000);
        }

        window.onload = createStars;
    </script>
</body>
</html>
