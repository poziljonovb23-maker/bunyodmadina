<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madinam uchun... ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0d1117;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Sahifalar (Qadamlar) */
        .step {
            display: none; /* Dastlab hamma yashirin */
            padding: 20px;
            animation: fadeIn 1s ease forwards;
        }

        .active {
            display: block; /* Faqat aktiv qadam ko'rinadi */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Tugma dizayni */
        .btn-next {
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn-next:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        /* Taymer dizayni */
        .timer-container {
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .timer-box span {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--gold);
        }

        .timer-box small {
            font-size: 0.7rem;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Yurakchalar animatsiyasi */
        .heart {
            position: absolute;
            color: #ff4d6d;
            pointer-events: none;
            animation: float 4s linear infinite;
            z-index: -1;
        }

        @keyframes float {
            to { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="step active" id="step1">
        <h1>Salom Go'zalim Madina! 👋</h1>
        <button class="btn-next" onclick="showNext()">Davom eting</button>
    </div>

    <div class="step" id="step2">
        <h1 style="font-size: 2.5rem;">Madinam ❤️</h1>
        <p>Siz dunyodagi eng chiroyli va yagona qizsiz!</p>
        
        <p style="font-style: italic; font-size: 1.1rem; color: #f0f0f0;">
            "Siz mening hayotimdagi eng go'zal mo''jizasiz. Har bir kunim siz bilan nurli va baxtli. Borligingiz uchun rahmat!"
        </p>

        <div class="timer-container">
            <p style="font-size: 0.9rem; letter-spacing: 2px; color: var(--gold); margin-bottom: 10px;">BIZ BIRGAMIZ:</p>
            <div class="timer-grid" id="timerDisplay">
                </div>
        </div>
    </div>

    <script>
        // Sahifani almashtirish funksiyasi
        function showNext() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            
            // Ikkinchi sahifa ochilganda yurakchalar va taymerni boshlash
            startHearts();
            setInterval(updateTimer, 1000);
        }

        // Tanishgan sana: 2024-yil, 12-oktabr
        // Eslatma: JSda oylar 0 dan boshlanadi (Oktabr = 9)
        const startDate = new Date(2024, 9, 12, 0, 0, 0);

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            const display = document.getElementById("timerDisplay");
            if (display) {
                display.innerHTML = `
                    <div class="timer-box"><span>${days}</span><small>KUN</small></div>
                    <div class="timer-box"><span>${hours}</span><small>SOAT</small></div>
                    <div class="timer-box"><span>${mins}</span><small>DAQIQA</small></div>
                    <div class="timer-box"><span>${secs}</span><small>SONIYA</small></div>
                `;
            }
        }

        // Uchuvchi yurakchalar
        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.bottom = '-5vh';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }, 300);
        }
    </script>
</body>
</html>
